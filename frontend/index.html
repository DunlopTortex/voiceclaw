<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VoiceCode</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <!-- Screen 1: Project Picker -->
      <div id="project-picker" class="screen">
        <div class="picker-content">
          <h1 class="picker-title">VoiceCode</h1>
          <p class="picker-subtitle">Select a project folder to get started</p>

          <div class="path-input-row">
            <input
              type="text"
              id="project-path"
              placeholder="/path/to/your/project"
              spellcheck="false"
            />
            <button id="browse-btn">Browse</button>
            <button id="open-btn">Open</button>
          </div>

          <div id="folder-browser">
            <div id="browser-header"></div>
            <div id="browser-list"></div>
          </div>

          <div id="recent-projects"></div>
        </div>
      </div>

      <!-- Screen 2: Voice UI -->
      <div id="voice-screen" class="screen" style="display: none">
        <header id="header">
          <div id="header-left">
            <h1>VoiceCode</h1>
            <span id="project-name" class="project-name"></span>
          </div>
          <div id="controls">
            <button id="change-project-btn" title="Change project">Change</button>
            <select id="mode-select">
              <option value="push-to-talk">Push-to-Talk</option>
              <option value="always-on">Always-On</option>
            </select>
            <button id="connect-btn">Connect</button>
          </div>
        </header>

        <main id="main">
          <!-- Left panel: Voice -->
          <section id="voice-panel">
            <div id="status-bar">
              <span id="connection-status" class="status-dot disconnected"></span>
              <span id="status-text">Disconnected</span>
            </div>

            <div id="mic-area">
              <button id="mic-btn" class="mic-btn" aria-label="Hold to speak">
                <svg viewBox="0 0 24 24" width="48" height="48" fill="currentColor">
                  <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z"/>
                  <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                </svg>
              </button>
              <p id="mic-hint">Hold Space to Talk</p>
            </div>

            <div id="text-input-area">
            <input type="text" id="text-input" placeholder="Type a message (test tools)" spellcheck="false" />
          </div>

          <div id="transcript"></div>
          </section>

          <!-- Right panel: Agent Activity + Diffs -->
          <section id="activity-panel">
            <div id="activity-feed">
              <h2>Agent Activity</h2>
              <div id="activity-log"></div>
            </div>

            <div id="diff-panel">
              <h2>File Changes</h2>
              <div id="diffs"></div>
            </div>
          </section>
        </main>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
